    <section class="formulario">
      <h1>Cadastro de Usuário</h1>

      <form>
        <label>Nome Completo</label>
        <input type="text" placeholder="Digite seu nome" required />

        <label>CPF</label>
        <input type="text" placeholder="Digite seu nome" required />

        <label>E-mail</label>
        <input type="email" placeholder="Digite seu e-mail" required />

        <label>Telefone</label>
        <input type="tel" placeholder="(75) 90000-0000" />

        <label>Data de Nascimento</label>
        <input type="date" />

        <label>Senha</label>
        <input type="password" placeholder="Crie uma senha" required />

        <label>Confirmar Senha</label>
        <input type="password" placeholder="Repita a senha" required />

        <label>Gênero</label>
        <div>
          <label><input type="radio" name="genero" /> Masculino</label>
          <label><input type="radio" name="genero" /> Feminino</label>
          <label><input type="radio" name="genero" /> Outro</label>
        </div>

        <button type="submit">Cadastrar</button>
      </form>
    </section>
